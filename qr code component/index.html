<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

/* (https://fonts.google.com/specimen/Outfit)
- Weights: 400, 700 */

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: hsl(212, 45%, 89%);
      font-size: 1rem;
    }

    .box{
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: hsl(0, 0%, 100%);
      border-radius: 1rem;
      box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
      padding: 1rem;
      max-width: 300px;
      margin: auto;

    }
    .card{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: hsl(0, 0%, 100%);
    }

    img {
      width: 100%;
      border-radius: 1rem;
    }
    .title{
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      margin:1rem;
      color: hsl(218, 44%, 22%);
      background-color: hsl(0, 0%, 100%);
      font-family: 'Outfit', sans-serif;
    }

    .description{
      font-size: 0.9rem;
      text-align: center;
      color: hsl(220, 15%, 55%);
      font-family: 'Outfit', sans-serif;
      padding: 0rem 1rem;
      margin-bottom: 1rem;
      background-color: hsl(0, 0%, 100%);
      font-weight: 400;
    }

  </style>
</head>
<body>
<div class="box">
  <div class="container">
    <div class="card">
      <img src="./images/image-qr-code.png" alt="QR Code" class="qr-code">
      <h1 class="title">Improve your front-end skills by building projects</h1>
      <p class="description">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
</div>

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>
</html>
